utterances:
- id: u1
  t: 00:00:00
  speaker: 徐浩伦
  text: 大家好，我是徐浩伦。
- id: u2
  t: 00:00:02
  speaker: 谭湘文
  text: 大家好，我是谭湘文在这里给大家拜年啦。
- id: u3
  t: 00:00:08
  speaker: 谭湘文
  text: 哎呀，分享一个好消息，
- id: u4
  t: 00:00:08
  speaker: 徐浩伦
  text: 什么消息？
- id: u5
  t: 00:00:11
  speaker: 谭湘文
  text: 呃，今年我的岳父岳母啊要结婚了
- id: u6
  t: 00:00:11
  speaker: 徐浩伦
  text: 吗？
- id: u7
  t: 00:00:14
  speaker: 徐浩伦
  text: 怎么要结婚了呢？
- id: u8
  t: 00:00:16
  speaker: 谭湘文
  text: 人家早结婚了嘛啊，我说你要结婚了啊，对，所以过年嘛啊岳父岳母来我家里头哦，我准备买一次菜呀，给他们露一手，把他们搞定了。
- id: u9
  t: 00:00:25
  speaker: 谭湘文
  text: 我跟你说，买菜这个事情很难的，
- id: u10
  t: 00:00:25
  speaker: 徐浩伦
  text: 那买菜有什么难？
- id: u11
  t: 00:00:29
  speaker: 徐浩伦
  text: 你要不相信的话，你可以找我买次菜啊，试一试呗啊来。
- id: u12
  t: 00:00:33
  speaker: 徐浩伦
  text: 随便看随便看啊，呃，不新鲜不要钱。
- id: u13
  t: 00:00:37
  speaker: 谭湘文
  text: 呃，老板，你这青菜怎么卖的呀？
- id: u14
  t: 00:00:39
  speaker: 徐浩伦
  text: 看之前买过菜没有？6800。
- id: u15
  t: 00:00:39
  speaker: 谭湘文
  text: 没有啊，多少？
- id: u16
  t: 00:00:47
  speaker: 徐浩伦
  text: 6800、600，嗯，还这是落地价。
- id: u17
  t: 00:00:47
  speaker: 谭湘文
  text: 你自己说出来心虚不啊。还落地价？青菜就是从地里面出来的，还落地价，到底多少钱？
- id: u22
  t: 00:00:57
  speaker: 徐浩伦
  text: 好好好，5块钱，
- id: u23
  t: 00:00:57
  speaker: 谭湘文
  text: 你5块钱也贵了呢？
- id: u24
  t: 00:01:01
  speaker: 谭湘文
  text: 人家卖2块3块，你凭什么卖5块呢？
- id: u25
  t: 00:01:03
  speaker: 徐浩伦
  text: 你是不当家，不知柴米油盐贵，他贵又贵的道理吗？
- id: u26
  t: 00:01:06
  speaker: 谭湘文
  text: 什么道理吗？
- id: u27
  t: 00:01:07
  speaker: 徐浩伦
  text: 这个青菜是我辛辛苦苦，早上4点亲自搞回来的，
- id: u28
  t: 00:01:07
  speaker: 谭湘文
  text: 你起那么早干嘛了？
- id: u29
  t: 00:01:12
  speaker: 谭湘文
  text: 5点就有人抓了，偷的菜在这里卖呀？
- id: u30
  t: 00:01:15
  speaker: 徐浩伦
  text: 无聊吧，你说啊你家里是几个人吃饭，
- id: u31
  t: 00:01:15
  speaker: 谭湘文
  text: 我家里四个人，
- id: u32
  t: 00:01:15
  speaker: 徐浩伦
  text: 4个人吃饭，买一个青菜肯定不够吃。
- id: u33
  t: 00:01:22
  speaker: 谭湘文
  text: 那少了。
- id: u34
  t: 00:01:23
  speaker: 徐浩伦
  text: 你看这样可以不啊，可以少两个人，
- id: u35
  t: 00:01:23
  speaker: 谭湘文
  text: 不可以
- id: u36
  t: 00:01:23
  speaker: 徐浩伦
  text: 多两个菜吗？
- id: u37
  t: 00:01:26
  speaker: 谭湘文
  text: 对。
- id: u38
  t: 00:01:27
  speaker: 谭湘文
  text: 过年少两个人干嘛呢？
- id: u39
  t: 00:01:29
  speaker: 徐浩伦
  text: 我哈你看你想多个什么菜
- id: u40
  t: 00:01:29
  speaker: 谭湘文
  text: 呃，我想搞点硬菜，
- id: u41
  t: 00:01:29
  speaker: 徐浩伦
  text: 硬菜，嗯，硬菜推荐你搞一个炖铁锅，炖铁锅啊。
- id: u42
  t: 00:01:37
  speaker: 谭湘文
  text: 啊，那就是把锅洗一遍了。
- id: u43
  t: 00:01:39
  speaker: 徐浩伦
  text: 大哥嗯铁锅炖吧，铁锅炖什么很重要。
- id: u44
  t: 00:01:42
  speaker: 徐浩伦
  text: 对，我跟你说，海鲜可以，海鲜，我这里的鲍鱼个头大，可以三头鲍，哎呦，大了大大大两头鲍，哎呦，这个更大了。
- id: u45
  t: 00:01:51
  speaker: 谭湘文
  text: football，这这是个什么东西呢？
- id: u46
  t: 00:01:58
  speaker: 谭湘文
  text: 足球football.
- id: u47
  t: 00:02:03
  speaker: 徐浩伦
  text: 干嘛啊，嗯把足球放在水缸子里干什么脏不脏啊？
- id: u48
  t: 00:02:07
  speaker: 徐浩伦
  text: 大哥啊，我不是想着你自己家里开餐，对不对？
- id: u49
  t: 00:02:07
  speaker: 徐浩伦
  text: 哎呀，你就弄一个菜，然后再弄点青菜，
- id: u50
  t: 00:02:10
  speaker: 谭湘文
  text: 我说你听我说啊，不是我自己吃啊，我是第一次见岳父岳母好，我这一顿饭主要是想把我岳父就搞定了。
- id: u51
  t: 00:02:21
  speaker: 徐浩伦
  text: 你搞定岳父，你得学会投其所好。
- id: u52
  t: 00:02:23
  speaker: 谭湘文
  text: 哎，我又不知道他喜欢什么呀，
- id: u53
  t: 00:02:23
  speaker: 徐浩伦
  text: 你看他有什么，就说明他喜欢什么，
- id: u54
  t: 00:02:23
  speaker: 谭湘文
  text: 什么意思？
- id: u55
  t: 00:02:27
  speaker: 徐浩伦
  text: 就比方说你岳父要是有痛风啊，就说明肯定平时喜欢吃点海鲜，你就搞点海鲜。
- id: u56
  t: 00:02:33
  speaker: 徐浩伦
  text: 再来点啤酒配两粒头孢，你对症一下药。
- id: u57
  t: 00:02:37
  speaker: 谭湘文
  text: 哎你这个不叫对症下药啊，你这个叫对症下手，知道吧？
- id: u58
  t: 00:02:42
  speaker: 徐浩伦
  text: 啊，你不是要搞定岳父吗？
- id: u59
  t: 00:02:44
  speaker: 谭湘文
  text: 我搞定岳父，我不解决岳父呢，大哥人。
- id: u60
  t: 00:02:47
  speaker: 徐浩伦
  text: 哦，好那那你会做饭吗？
- id: u61
  t: 00:02:50
  speaker: 谭湘文
  text: 我手艺一般嘛，
- id: u62
  t: 00:02:50
  speaker: 徐浩伦
  text: 手艺一般，我就推荐你做一些简单的大菜。
- id: u63
  t: 00:02:54
  speaker: 谭湘文
  text: 你比方说呢
- id: u64
  t: 00:02:54
  speaker: 徐浩伦
  text: 呃香菇炖鸡可以红烧牛肉哎，也行的，老坛酸菜
- id: u65
  t: 00:02:54
  speaker: 谭湘文
  text: 等一下等一下。
- id: u66
  t: 00:03:00
  speaker: 谭湘文
  text: 你这个菜怎么越听越方便呢，看你买的是袋装的还是桶装的，那不就是方便面。
- id: u67
  t: 00:03:07
  speaker: 徐浩伦
  text: 大哥呀，方便面，你过年吃方便面有点太单调了，知道吧？
- id: u68
  t: 00:03:12
  speaker: 徐浩伦
  text: 你勾点芡嘛？
- id: u69
  t: 00:03:14
  speaker: 谭湘文
  text: 你是说胡话吧，你说啊勾点芡就不单调了吗？
- id: u70
  t: 00:03:19
  speaker: 徐浩伦
  text: 这个东西吃多了，聪明
- id: u71
  t: 00:03:19
  speaker: 谭湘文
  text: 谁跟你讲的呢？
- id: u72
  t: 00:03:21
  speaker: 徐浩伦
  text: 是一堑长一智嘛
- id: u73
  t: 00:03:21
  speaker: 谭湘文
  text: 是。
- id: u74
  t: 00:03:24
  speaker: 谭湘文
  text: 那是哪个去了，你脑子里面勾了芡嘛，
- id: u75
  t: 00:03:24
  speaker: 徐浩伦
  text: 你说哎主要是我不知道你那个岳父岳母有什么忌口或者偏好，你要不问清楚，我再给你推荐
- id: u76
  t: 00:03:24
  speaker: 谭湘文
  text: 哦哦，好了好了，好不好？
- id: u77
  t: 00:03:34
  speaker: 徐浩伦
  text: 打个电话好吧，问清楚嘛。
- id: u78
  t: 00:03:39
  speaker: 谭湘文
  text: 喂，宝贝，
- id: u79
  t: 00:03:39
  speaker: 徐浩伦
  text: 你管你岳父叫宝贝啊，
- id: u80
  t: 00:03:39
  speaker: 谭湘文
  text: 谁管我岳父叫宝贝了，大哥这我女朋友吗？
- id: u81
  t: 00:03:44
  speaker: 谭湘文
  text: 哦嗯
- id: u82
  t: 00:03:44
  speaker: 徐浩伦
  text: 哎你问一下叔叔阿姨是哪里人哦
- id: u83
  t: 00:03:44
  speaker: 谭湘文
  text: 哦呃，问一下叔叔阿姨是哪里人啊？
- id: u84
  t: 00:03:52
  speaker: 谭湘文
  text: 哦，叔叔是南方的啊，阿姨是北方的，
- id: u85
  t: 00:03:52
  speaker: 徐浩伦
  text: 怎么怎么干嘛，他们是网恋，那不管你的事了，好不好啊，你研究他们怎么在一起的，
- id: u86
  t: 00:03:52
  speaker: 谭湘文
  text: 我问什么来着？
- id: u87
  t: 00:04:03
  speaker: 徐浩伦
  text: 呃，那个忌口忌口。
- id: u88
  t: 00:04:03
  speaker: 谭湘文
  text: 对，对，买菜问忌口，对。
- id: u89
  t: 00:04:06
  speaker: 谭湘文
  text: 啊，哎呀，宝贝，我知道你不吃葱哦，叔叔不吃姜是吧？
- id: u90
  t: 00:04:12
  speaker: 谭湘文
  text: 阿姨还不吃蒜啊，
- id: u91
  t: 00:04:12
  speaker: 徐浩伦
  text: 那基本上就是不吃饭了啊，
- id: u92
  t: 00:04:12
  speaker: 谭湘文
  text: 我这就有点难搞了了啊，
- id: u93
  t: 00:04:12
  speaker: 徐浩伦
  text: 干嘛干嘛？
- id: u94
  t: 00:04:20
  speaker: 徐浩伦
  text: 你是不是不会做饭，要不我直接跟你直接跟他沟通。
- id: u95
  t: 00:04:23
  speaker: 谭湘文
  text: 对喂宝贝，
- id: u96
  t: 00:04:23
  speaker: 徐浩伦
  text: 你不能宝贝吧。
- id: u97
  t: 00:04:27
  speaker: 谭湘文
  text: 我女朋友呢，她是哦，好好，哎，那个呃除了葱姜蒜以外，还有什么别的忌口没有？
- id: u98
  t: 00:04:33
  speaker: 谭湘文
  text: 对对对对啊，好，没问题。
- id: u99
  t: 00:04:35
  speaker: 谭湘文
  text: 哦，啊，那交给我。
- id: u100
  t: 00:04:36
  speaker: 谭湘文
  text: 好好好好，拜拜
- id: u101
  t: 00:04:36
  speaker: 徐浩伦
  text: 嘿嘿，哎呀，到底是专业的啊，搞什么嘞？
- id: u102
  t: 00:04:39
  speaker: 徐浩伦
  text: 方便面又是方便面。
- id: u103
  t: 00:04:41
  speaker: 谭湘文
  text: 你一年到头就是方便面，方便面里有葱姜蒜了耶，你别放料包嘛，
- id: u104
  t: 00:04:41
  speaker: 徐浩伦
  text: 我缺德吧，
- id: u105
  t: 00:04:41
  speaker: 谭湘文
  text: 我是啊他一家三口到我家吃方便面就算了，我还不放料包，那不就三个人抱在那啃面饼，三个土拨鼠啊，他是啊。
- id: u106
  t: 00:04:58
  speaker: 谭湘文
  text: 啊，算了，我问你靠不住，我问小红书，上面有真人解答，有什么没有中真人就在这里。
- id: u107
  t: 00:05:05
  speaker: 徐浩伦
  text: 你个号你不出好主意啊，
- id: u108
  t: 00:05:05
  speaker: 谭湘文
  text: 问题是你不是不吃葱姜蒜吗？
- id: u109
  t: 00:05:09
  speaker: 徐浩伦
  text: 对呀，你就做个鸡汤，
- id: u110
  t: 00:05:09
  speaker: 谭湘文
  text: 鸡汤怎么做啊？
- id: u111
  t: 00:05:12
  speaker: 徐浩伦
  text: 很简单啊，回去以后，你就给你岳父岳母讲。
- id: u112
  t: 00:05:15
  speaker: 徐浩伦
  text: 嗯，当你学会爱自己，世界也会爱上你，
- id: u113
  t: 00:05:15
  speaker: 谭湘文
  text: 不是心灵鸡汤啊，大哥。
- id: u114
  t: 00:05:20
  speaker: 谭湘文
  text: 他几十岁了，要我跟他说什么心灵鸡汤了，要能喝的鸡汤啊，能喝的鸡汤。
- id: u115
  t: 00:05:25
  speaker: 徐浩伦
  text: 对对对，那你就拿一只走地鸡回去哦，再买点虫草提鲜哦，
- id: u116
  t: 00:05:25
  speaker: 谭湘文
  text: 那虫草怎么卖的呢？
- id: u117
  t: 00:05:30
  speaker: 徐浩伦
  text: 这边是虫，这边是草，虫草分开卖的呀。
- id: u118
  t: 00:05:34
  speaker: 谭湘文
  text: 从来是一个东西，大哥。
- id: u119
  t: 00:05:34
  speaker: 徐浩伦
  text: 还可以买点鸡尾虾啊，
- id: u120
  t: 00:05:34
  speaker: 谭湘文
  text: 鸡尾虾倒是可以了。
- id: u121
  t: 00:05:39
  speaker: 谭湘文
  text: 嗯，多少钱嘛？
- id: u122
  t: 00:05:40
  speaker: 徐浩伦
  text: 55块钱一斤
- id: u123
  t: 00:05:40
  speaker: 谭湘文
  text: 太贵了喽，你开口的55太贵了嘛，
- id: u124
  t: 00:05:40
  speaker: 徐浩伦
  text: 你可以砍价嘛。
- id: u125
  t: 00:05:48
  speaker: 徐浩伦
  text: 啊，你可以砍价，砍价就像你的生活一样，你不试一下，你怎么知道会不会成功嘞？
- id: u126
  t: 00:05:55
  speaker: 徐浩伦
  text: 大家说对不对？
- id: u127
  t: 00:05:59
  speaker: 谭湘文
  text: 哦。
- id: u128
  t: 00:06:03
  speaker: 谭湘文
  text: 可以便宜点不？
- id: u129
  t: 00:06:04
  speaker: 徐浩伦
  text: 不可以，
- id: u130
  t: 00:06:04
  speaker: 谭湘文
  text: 生活就这么对我的呀，
- id: u131
  t: 00:06:04
  speaker: 徐浩伦
  text: 才说可以谈呢。
- id: u132
  t: 00:06:09
  speaker: 徐浩伦
  text: 大哥啊，那主要是砍价伤感情，
- id: u133
  t: 00:06:09
  speaker: 谭湘文
  text: 我跟你又没有感情了啊，
- id: u134
  t: 00:06:09
  speaker: 徐浩伦
  text: 那贵他贵他这个是河虾，
- id: u135
  t: 00:06:09
  speaker: 谭湘文
  text: 河虾凭什么贵呢？
- id: u136
  t: 00:06:15
  speaker: 徐浩伦
  text: 以河为贵嘛？
- id: u137
  t: 00:06:16
  speaker: 谭湘文
  text: The。
- id: u138
  t: 00:06:19
  speaker: 谭湘文
  text: 你要这么搞就没有意思了，好吧？
- id: u139
  t: 00:06:21
  speaker: 徐浩伦
  text: ，何必呢我知道我知道你看这样行不行啊，过年啊，你买一点虾子，我给你多送一点不就可以了，这样就可以了吗？
- id: u140
  t: 00:06:28
  speaker: 徐浩伦
  text: 给你多送一点啊，嗯，是不是给你装起来，对，别说我什么缺斤少两，嗯，我这是个电子秤啊，等一下嗯，
- id: u141
  t: 00:06:28
  speaker: 谭湘文
  text: 我怕的就是电子秤，知道吧？
- id: u142
  t: 00:06:38
  speaker: 谭湘文
  text: 啊，我自己先试一下，可以不？
- id: u143
  t: 00:06:40
  speaker: 徐浩伦
  text: 嗯，我知道啊，不相信我这种小摊小贩哦，
- id: u144
  t: 00:06:40
  speaker: 谭湘文
  text: 没有嘞，单纯的不相信你知道吧？
- id: u145
  t: 00:06:44
  speaker: 徐浩伦
  text: 啊。
- id: u146
  t: 00:06:45
  speaker: 徐浩伦
  text: 手机啊，我跟你说，人与人之间最基本的就是信任不差那么几块钱，不用看了，知道不？
- id: u147
  t: 00:06:53
  speaker: 徐浩伦
  text: 我们回头是客，是不是八斤啊？
- id: u148
  t: 00:06:58
  speaker: 谭湘文
  text: 8斤呐啊，我手机有8斤嘞，我每天背着板砖在上班哦，你删两张照片嘛，
- id: u149
  t: 00:06:58
  speaker: 徐浩伦
  text: 不是内存的问题啊，我跟你说啊。
- id: u150
  t: 00:07:12
  speaker: 徐浩伦
  text: 和单位的不一样嘞，单位不一样，我给你换个单位就可以了。
- id: u151
  t: 00:07:17
  speaker: 谭湘文
  text: 换嘛，你想去事业单位吗？
- id: u152
  t: 00:07:18
  speaker: 徐浩伦
  text: 不是换我的单位啊。
- id: u153
  t: 00:07:20
  speaker: 徐浩伦
  text: 换计量单位哦，换计量单位。
- id: u154
  t: 00:07:22
  speaker: 谭湘文
  text: 对对对，换个单位嘛。
- id: u155
  t: 00:07:23
  speaker: 徐浩伦
  text: 呃，现在是一斤三两三两我就不收你的钱，算我送你的好，我就收你一斤的钱，收你55好不好？
- id: u156
  t: 00:07:30
  speaker: 谭湘文
  text: 呃，你别55了，你收我50，少我5块钱算了，我吧，我已经送了三两，你这样我少了你三两，你还是过年嘛你给个54行不行，过去53也可以，哎呀，你给个52也行，要不退给我走算了。
- id: u157
  t: 00:07:44
  speaker: 徐浩伦
  text: 好吧，没有必要几块钱扯什么扯的，又不是不做你生意了。
- id: u158
  t: 00:07:49
  speaker: 谭湘文
  text: 我接个电话啊，真的是了。
- id: u159
  t: 00:07:53
  speaker: 谭湘文
  text: 哎哎哎仔仔，新年快乐。
- id: u160
  t: 00:07:55
  speaker: 谭湘文
  text: 哎，儿子给你拜年了。
- id: u161
  t: 00:07:57
  speaker: 谭湘文
  text: 哎，好，把电话给妈妈。
- id: u162
  t: 00:07:58
  speaker: 谭湘文
  text: 哎，老婆新年快乐。
- id: u163
  t: 00:07:59
  speaker: 谭湘文
  text: 好好好，蛮幸福的啊啊，他想报兴趣班，你给他报嘛，对吧？
- id: u164
  t: 00:08:03
  speaker: 谭湘文
  text: 真的差钱能差多少钱呢？
- id: u165
  t: 00:08:06
  speaker: 谭湘文
  text: 差这么多。
- id: u166
  t: 00:08:08
  speaker: 谭湘文
  text: 哦，好好好好了，你先别着急啊，嗯，我在这里嘛，对不对？
- id: u167
  t: 00:08:14
  speaker: 谭湘文
  text: 我可以想办法啊，对啊啊哎呦，你别哭啊，爸不不不爸，
- id: u168
  t: 00:08:14
  speaker: 徐浩伦
  text: 大哥车好多钱了，5块钱，他就是冲我来的来这。
- id: u169
  t: 00:08:22
  speaker: 谭湘文
  text: 好，
- id: u170
  t: 00:08:22
  speaker: 徐浩伦
  text: 打电话让你听见了啊，你就是打给我听的吧啊，哎你这个叫电家电话，知道吧？
- id: u171
  t: 00:08:30
  speaker: 谭湘文
  text: 啊，好好好好，5块钱我扫给你好不好啊，
- id: u172
  t: 00:08:30
  speaker: 徐浩伦
  text: 给你扫10块钱吗？
- id: u173
  t: 00:08:33
  speaker: 谭湘文
  text: 凭什么呢？
- id: u174
  t: 00:08:34
  speaker: 徐浩伦
  text: 双胞胎那是的。
- id: u175
  t: 00:08:35
  speaker: 谭湘文
  text: 你双胞胎的兴趣班都是我一个人抱啊啊啊，你们家团团圆圆，我饭都没做在这里啊，
- id: u176
  t: 00:08:35
  speaker: 徐浩伦
  text: 你你我我跟你说，我是过来人，你有没有想过，其实你见岳父岳母不需要那么多花里胡哨的技巧，只要你跟他真心相爱，真诚才是你最好的手艺。
- id: u177
  t: 00:08:52
  speaker: 谭湘文
  text: 好喽，还是你的鸡汤煲的好些喽。
- id: u178
  t: 00:08:56
  speaker: 徐浩伦
  text: 说到鸡汤，别说我人不行啊，我给你拿只中华土鸡，那你拿回去做家宴，我就不多收你的钱了。
- id: u179
  t: 00:09:03
  speaker: 谭湘文
  text: 不不不不，你该收多少钱是多少不不，
- id: u180
  t: 00:09:03
  speaker: 徐浩伦
  text: 你相信我，我是真的，我是过来人，我希望你能够幸福，主要快过年了，你赶紧回去赶你那个团圆饭哦，主要是到点了，我也要走了哦，
- id: u181
  t: 00:09:03
  speaker: 谭湘文
  text: 你要赶团圆饭是吧？
- id: u182
  t: 00:09:13
  speaker: 谭湘文
  text: 哎呦这个摊子的老板快回来了，我说他的摊子呀哎。
- id: u183
  t: 00:09:16
  speaker: 徐浩伦
  text: 推起。
