utterances:
- id: u1
  t: 00:00:00
  speaker: 徐浩伦
  text: 大家好，我是徐浩伦。
- id: u2
  t: 00:00:01
  speaker: 谭湘文
  text: 大家好，我是谭湘文。
- id: u3
  t: 00:00:02
  speaker: 谭湘文
  text: 在这里给大家拜个早年。
- id: u4
  t: 00:00:07
  speaker: 谭湘文
  text: 你看新年了啊新年了，新年新气象。
- id: u5
  t: 00:00:10
  speaker: 谭湘文
  text: 对对对啊，我准备改头换面了，
- id: u6
  t: 00:00:10
  speaker: 徐浩伦
  text: 你是犯了什么事啊，
- id: u7
  t: 00:00:10
  speaker: 谭湘文
  text: 不是犯了什么事啊，就是准备换一个新发型啊，从头开始。
- id: u8
  t: 00:00:17
  speaker: 谭湘文
  text: 哎，对对对，这个新的发型啊，好久没有去理发店了嘛啊，我们模拟一下这个感觉啊，想去模拟一下去理发店的感觉，试一下啊，模拟一下这个场景啊，要得了。
- id: u9
  t: 00:00:27
  speaker: 谭湘文
  text: 哎，哎呀，好久没有剪头发了，理发店到了，干鸡蛋。
- id: u10
  t: 00:00:38
  speaker: 谭湘文
  text: 哦，剪头发的时候，哎对对对，走走走走好好好好，谢谢啊。
- id: u11
  t: 00:00:42
  speaker: 谭湘文
  text: 怎么你也坐下来了，是为什么呢？
- id: u12
  t: 00:00:45
  speaker: 谭湘文
  text: 你要演个理发师，知道吧？
- id: u13
  t: 00:00:47
  speaker: 谭湘文
  text: 不能是两个顾客了哦，
- id: u14
  t: 00:00:47
  speaker: 徐浩伦
  text: 我演理发师肯定啊，我剪头发啊。
- id: u15
  t: 00:00:50
  speaker: 徐浩伦
  text: 对对对对，晓得晓得晓得了啊啊，理发店到了，该剪的剪头发的是吧？
- id: u16
  t: 00:00:56
  speaker: 谭湘文
  text: 干什么了？
- id: u17
  t: 00:00:57
  speaker: 谭湘文
  text: 这抢劫呀，你准备啊你上来就简心聊两句不聊两句啊，
- id: u18
  t: 00:00:57
  speaker: 徐浩伦
  text: 你是过来剪头发的不？
- id: u19
  t: 00:01:02
  speaker: 谭湘文
  text: 对对对，可以剪了啊，
- id: u20
  t: 00:01:02
  speaker: 徐浩伦
  text: 不不能只聊两句，晓得吧，要先洗哦，先洗头发啊。
- id: u21
  t: 00:01:08
  speaker: 谭湘文
  text: 对对对，你还蛮懂套路啊，是流程，知道吗？
- id: u22
  t: 00:01:10
  speaker: 徐浩伦
  text: 坐坐坐坐坐。
- id: u23
  t: 00:01:12
  speaker: 徐浩伦
  text: 好好好，先给你试个水温啊，好好好好，水温可以吧？
- id: u24
  t: 00:01:17
  speaker: 谭湘文
  text: 啊，还可以好起来了，哎，光是水温啊，在这里，然后这多少给我扣两下吧，你说那洗发水也要用的，好不好啊，
- id: u25
  t: 00:01:17
  speaker: 徐浩伦
  text: 哎要钱的。
- id: u26
  t: 00:01:26
  speaker: 谭湘文
  text: 你看谁看不起了，这差你那笔钱啊，真的是的。
- id: u26b
  t: 00:01:26
  speaker: 徐浩伦
  text: hello，给你介绍一下啊，普通一点是这个洗护洗发水啊，好一点是这个去屑控油的啊，我建议你用这个去屑控油的，为什么呢？
- id: u27
  t: 00:01:37
  speaker: 徐浩伦
  text: 你用这个我赚的多一些，
- id: u27b
  t: 00:01:37
  speaker: 谭湘文
  text: 你赚的多些。
- id: u28
  t: 00:01:39
  speaker: 谭湘文
  text: 没这么缺德的小子们啊，你要这么搞，我用最便宜的最便宜的是吧？
- id: u29
  t: 00:01:43
  speaker: 徐浩伦
  text: 对，那就这个啊啊，可以来了，怎么了？
- id: u30
  t: 00:01:45
  speaker: 谭湘文
  text: 这是自己家做的剁辣椒剁辣椒啊，剁辣椒还是不行，小伙们啊，你把我当鱼头搞啊，在这里啊。
- id: u31
  t: 00:01:53
  speaker: 谭湘文
  text: 你不嫌便宜的，便宜的要是个洗发水不，是吧？
- id: u32
  t: 00:01:56
  speaker: 徐浩伦
  text: 哈哈哈哈哈。
- id: u33
  t: 00:01:58
  speaker: 徐浩伦
  text: 哎呀，来了，给你稍微弄一下头发啊，平时不怎么搞头发吧。
- id: u34
  t: 00:02:02
  speaker: 徐浩伦
  text: 哎，对对对，你看啊啊你这个头发像这个旋了啊，还是比较明显啊，明显一把握管这个比较炫舞，比较明显的人叫做漩涡鸣人，我一个螺旋丸戳死你，你信吗？
- id: u35
  t: 00:02:12
  speaker: 谭湘文
  text: 漩涡鸣人了，好好洗好不好？
- id: u36
  t: 00:02:15
  speaker: 徐浩伦
  text: 哦好好好。
- id: u37
  t: 00:02:16
  speaker: 徐浩伦
  text: 给你稍微冲个水好不好了，冲个水。
- id: u38
  t: 00:02:19
  speaker: 徐浩伦
  text: 嗯好，要吹一下不，
- id: u39
  t: 00:02:19
  speaker: 谭湘文
  text: 肯定要吹一下子，不吹是为什么呢？
- id: u40
  t: 00:02:23
  speaker: 徐浩伦
  text: 好了哎，干吹一下在这里啊。
- id: u41
  t: 00:02:27
  speaker: 谭湘文
  text: 还掉水了，在这里知道吧？
- id: u42
  t: 00:02:28
  speaker: 徐浩伦
  text: 干嘛？
- id: u43
  t: 00:02:29
  speaker: 谭湘文
  text: 吹风机吹哦，吹风机吹，真的是拿吹风机的嗯。
- id: u44
  t: 00:02:35
  speaker: 谭湘文
  text: 没电了，没气了吧，你是。
- id: u45
  t: 00:02:49
  speaker: 谭湘文
  text: Yeah.
- id: u46
  t: 00:02:50
  speaker: 徐浩伦
  text: 就别拿嘴巴学不，你这这哦好了，呃，想怎么结？
- id: u47
  t: 00:02:54
  speaker: 谭湘文
  text: 呃，你们这里有什么档位的啊，
- id: u48
  t: 00:02:54
  speaker: 徐浩伦
  text: 三个档位啊啊，普通的就是理发师，金牌理发师、明星理发师哦，
- id: u49
  t: 00:02:54
  speaker: 谭湘文
  text: 这有什么不一样呢？
- id: u50
  t: 00:03:02
  speaker: 谭湘文
  text: 呃，都是我都是你啊，那没有区别了，
- id: u51
  t: 00:03:02
  speaker: 徐浩伦
  text: 那个价格不一样嘞。
- id: u52
  t: 00:03:06
  speaker: 谭湘文
  text: 价格不一样，人美换有什么意义呢？
- id: u53
  t: 00:03:10
  speaker: 徐浩伦
  text: 大个要看我最近手头紧不紧，
- id: u54
  t: 00:03:10
  speaker: 谭湘文
  text: 没这么搞的，知道吧？
- id: u55
  t: 00:03:15
  speaker: 谭湘文
  text: 啊，选最便宜的最便宜的了好了，剪头发的来。
- id: u56
  t: 00:03:20
  speaker: 徐浩伦
  text: 那紧张哈搞个烟抽，打个烟酬啊，在这里啊，
- id: u57
  t: 00:03:20
  speaker: 谭湘文
  text: 还有预备动作是吧？
- id: u58
  t: 00:03:25
  speaker: 谭湘文
  text: 啊，直接剪就可以了，直接剪了啊，
- id: u59
  t: 00:03:25
  speaker: 徐浩伦
  text: 对，好好好呃，想怎么减呢？
- id: u60
  t: 00:03:29
  speaker: 徐浩伦
  text: 呃，剪个阑尾了，剪个阑尾是吧？
- id: u61
  t: 00:03:31
  speaker: 徐浩伦
  text: 哎，对对，那要打麻药啊，打什么麻药呢，在这里啊。
- id: u62
  t: 00:03:34
  speaker: 谭湘文
  text: 狼尾狼的尾巴，谁跑到理发店捡狼尾了那个人。
- id: u63
  t: 00:03:40
  speaker: 谭湘文
  text: 阑尾啊，不是阑尾，阑尾了阑尾了，也是后面一点点。
- id: u64
  t: 00:03:45
  speaker: 谭湘文
  text: 对对对对对对，后面剪个阑尾，嗯，上面和旁边怎么解呢？
- id: u65
  t: 00:03:48
  speaker: 谭湘文
  text: 呃，两边推掉，上面打包，后面不动他听不懂，这怎么听不懂呢啊。
- id: u66
  t: 00:03:53
  speaker: 谭湘文
  text: 给你讲的这么明白了啊，不是你上面要推掉，旁边要打包，就是感觉不是很和谐，不知道他该怎么下下刀，你就夹起来紧就可以了哦，夹起来紧。
- id: u67
  t: 00:04:01
  speaker: 徐浩伦
  text: 对对对好，稍等啊。
- id: u68
  t: 00:04:02
  speaker: 谭湘文
  text: 嗯帅哥，我是你夹起来的。
- id: u69
  t: 00:04:05
  speaker: 谭湘文
  text: 你有毛病吧，你说。
- id: u70
  t: 00:04:11
  speaker: 谭湘文
  text: 你夹起来有什么用呢？
- id: u71
  t: 00:04:13
  speaker: 谭湘文
  text: 把头发夹起来，我把头发夹起来，定啊你自己说清楚不要把头发夹起来剪嗯，
- id: u72
  t: 00:04:13
  speaker: 徐浩伦
  text: 哈哈哈发量还是多嘞，那年轻不还是年轻呢啊，羡慕你呢啊，大伙一看就是有约会吧。
- id: u73
  t: 00:04:26
  speaker: 徐浩伦
  text: 这的看得出来啊，很明显哦碰到了自己的爱情吧。
- id: u74
  t: 00:04:34
  speaker: 徐浩伦
  text: 哎，谁还没有年轻过呢？
- id: u75
  t: 00:04:37
  speaker: 徐浩伦
  text: 当年58啊，他十9。
- id: u76
  t: 00:04:40
  speaker: 徐浩伦
  text: 但他身份证写的是39，差的蛮远了，这这未必看不出来呀，他是还算比较幸运的哦在一个错误的时间嗯，遇到了一个错误的人群错啊，这没有是对的，是怎么回事呢？
- id: u77
  t: 00:04:52
  speaker: 徐浩伦
  text: 当年我们两个也是一见钟情哦。
- id: u78
  t: 00:04:55
  speaker: 徐浩伦
  text: 但是好景不长啊，两个人在一起没多久就分开了，哎也分手了，但是彼此约定了哦，他做我的king，我做他的king。
- id: u79
  t: 00:05:04
  speaker: 谭湘文
  text: 哎呀，你们理发师玩的是真的非主流嘞，我的天老叶。
- id: u80
  t: 00:05:08
  speaker: 徐浩伦
  text: 为了今天这段失去的爱情啊，还给他写了一首歌，什么歌呢？
- id: u81
  t: 00:05:12
  speaker: 谭湘文
  text: k卡卡，你好好剪头发啊，我再也不要听到任何的歌曲了，好不好啊。
- id: u82
  t: 00:05:21
  speaker: 徐浩伦
  text: 哎，你稍微看一下啊，整体的形状还可以不啊，
- id: u83
  t: 00:05:21
  speaker: 谭湘文
  text: 还可以了，没什么问题了。
- id: u84
  t: 00:05:26
  speaker: 谭湘文
  text: 噻啊，对对对，可以的噻哦，搞完了是吧，搞完了呢哦，帅哥，我跟你说一下啊，哎，就这个剪头发了，哎，他不能只剪一边，晓得吧？
- id: u85
  t: 00:05:34
  speaker: 谭湘文
  text: 你就不只在左边，你没往右边来过来啊，哦这边也要检查，那肯定不哦，你现在剪个那个狗尾是吧，谁剪狗尾了，狼尾，你听不懂人话是怎么回事呢？
- id: u86
  t: 00:05:43
  speaker: 谭湘文
  text: 理发师都听不懂人话那，你又怎么样呢？
- id: u87
  t: 00:05:46
  speaker: 谭湘文
  text: 你们真就没有听得懂人话的理发师啊啊，你要听得懂人话的理发肯定要啊。
- id: u88
  t: 00:05:55
  speaker: 徐浩伦
  text: 你好，稍等了。
- id: u89
  t: 00:05:55
  speaker: 徐浩伦
  text: 呃，小华小华有客人找你哎。
- id: u90
  t: 00:05:58
  speaker: 谭湘文
  text: 非常好，看你们这里哎对对对对好，觉得好他觉得好哎，接得好啊，对嗯嗯，我想请个郎尾好好。
- id: u91
  t: 00:06:12
  speaker: 谭湘文
  text: 他说好嘞好嘞，我想剪个阑尾嘞。
- id: u92
  t: 00:06:18
  speaker: 徐浩伦
  text: 好嘞，他说好嘞。
- id: u93
  t: 00:06:24
  speaker: 谭湘文
  text: 而且他怎么只动嘴，不动手，是为什么呢？
- id: u94
  t: 00:06:27
  speaker: 徐浩伦
  text: 啊，他是听得懂的，他不会解，那有什么用呢，真的是的，谢谢大家。
