  text: 阿莫西林都出来了啊，是草药怎么抓出胶囊来的呢？
- id: u138
  t: 00:07:25
  speaker: 谭湘文
  text: 你等什么呢？
- id: u139
  t: 00:07:26
  speaker: 谭湘文
  text: 啊，我这个阿莫西林你把它切开会发现里面是一粒扇呗，
- id: u140
  t: 00:07:26
  speaker: 徐浩伦
  text: 这是怎么塞进去的呢？
- id: u141
  t: 00:07:31
  speaker: 谭湘文
  text: 我的。
- id: u142
  t: 00:07:32
  speaker: 谭湘文
  text: 呃，还想吃点什么，
- id: u143
  t: 00:07:32
  speaker: 徐浩伦
  text: 还想吃点什么呀我想吃什么，吃什么是吧？
- id: u144
  t: 00:07:36
  speaker: 谭湘文
  text: 你开什么，我吃什么，
- id: u145
  t: 00:07:36
  speaker: 谭湘文
  text: 那再给你开一杯人参，
- id: u146
  t: 00:07:36
  speaker: 徐浩伦
  text: 哎，人参就没有必要太补了。
- id: u147
  t: 00:07:41
  speaker: 谭湘文
  text: 重点不是给你补不补啊，重点是这个人参在我这里再放一会就过期了，过期了卖给我，你缺得嘞这算下这里是人参是50块钱一斤，这里是半斤，我就收你800块钱，
- id: u148
  t: 00:07:41
  speaker: 徐浩伦
  text: 哪里就800块钱来了，买你这么赚钱的啊，
- id: u149
  t: 00:07:41
  speaker: 谭湘文
  text: 我是让你花钱买个教训啊，就是有你这种抱有这个侥幸心理的人，想花点小钱，通过封建迷信去改变自己的命运。
- id: u150
  t: 00:08:02
  speaker: 谭湘文
  text: 我告诉你，做人不要异想天开，踏踏实实做自己，晓得不？
- id: u151
  t: 00:08:06
  speaker: 谭湘文
  text: 嗯，我看你人也还不错了。
- id: u152
  t: 00:08:08
  speaker: 谭湘文
  text: 嗯，老夫也愿意交你这个朋友哦哦，是这样嗯，你再给我500块钱，再给群众嘛，我给你把药换成真的药也是假的，谢谢大家。
